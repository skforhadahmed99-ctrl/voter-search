<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Data Search System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 10px; background-color: #f5f6fa; }
        .header { background-color: #1565c0; color: white; padding: 15px; font-size: 20px; font-weight: bold; text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .container { max-width: 600px; margin: 10px auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .col { flex: 1; display: flex; align-items: center; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; background-color: #fdfdfd; font-size: 14px; }
        label { width: 80px; font-weight: bold; font-size: 14px; color: #333; }
        .btn-container { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; color: white; }
        .btn-search { background-color: #2e7d32; }
        .btn-clear { background-color: #c62828; }
        .status-bar { background-color: #e3f2fd; color: #0d47a1; padding: 10px; border-radius: 4px; margin-top: 15px; display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; }
        .results { margin-top: 20px; }
        .no-data { text-align: center; margin-top: 40px; color: #7f8c8d; font-size: 16px; font-weight: 500; }
        
        /* 🛠️ আপনার স্ক্রিনশট অনুযায়ী নতুন প্রফেশনাল ভোটার কার্ড ডিজাইন */
        .voter-box { background: #fff; border: 2px solid #c62828; border-radius: 8px; overflow: hidden; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .voter-header { background-color: #1565c0; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 15px; }
        .voter-id-section { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.2); padding: 4px 8px; border-radius: 4px; font-size: 14px; }
        .voter-body { padding: 15px; background: #fff; }
        .voter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .voter-field { font-size: 14px; color: #333; display: flex; align-items: center; }
        .voter-field span.label { color: #7f8c8d; font-weight: normal; width: 70px; display: inline-block; }
        .voter-field span.value { font-weight: bold; color: #111; }
        .full-width-field { background: #f8f9fa; padding: 8px; border-radius: 4px; margin-top: 10px; font-size: 14px; border: 1px solid #eef2f3; }
        .full-width-field span.label { color: #7f8c8d; font-weight: normal; margin-right: 5px; }
        .full-width-field span.value { font-weight: bold; color: #111; }
        .voter-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #dfe4ea; font-size: 13px; }
        .gender-tag { background-color: #1565c0; color: white; padding: 3px 10px; border-radius: 20px; font-weight: bold; font-size: 12px; display: flex; align-items: center; gap: 3px; }
        .copy-btn { cursor: pointer; background: none; border: none; color: white; font-size: 14px; display: flex; align-items: center; }

        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #1565c0; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header">Easy Data Search System</div>

<div class="container">
    <div class="row">
        <div class="col">
            <select id="district">
                <option value="All">সব জেলা (All)</option>
                <option value="Chandpur" selected>চাঁদপুর (Chandpur)</option>
            </select>
        </div>
        <div class="col">
            <select id="upazila">
                <option value="All">সব উপজেলা (All)</option>
                <option value="ফরিদগঞ্জ উপজেলা">ফরিদগঞ্জ উপজেলা</option>
                <option value="চাঁদপুর সদর">চাঁদপুর সদর</option>
                <option value="কচুয়া">কচুয়া</option>
                <option value="হাজীগঞ্জ">হাজীগঞ্জ</option>
            </select>
        </div>
    </div>

    <div class="row">
        <div class="col" style="flex: 1;"><label>ভোটার ID:</label><input type="text" id="voterId" placeholder="ভোটার আইডি লিখুন..."></div>
    </div>

    <div class="row">
        <div class="col"><label>নাম:</label><input type="text" id="name" placeholder="লিখুন..."></div>
        <div class="col"><label>পিতা:</label><input type="text" id="father" placeholder="লিখুন..."></div>
    </div>
    
    <div class="row">
        <div class="col"><label>মাতা:</label><input type="text" id="mother" placeholder="লিখুন..."></div>
        <div class="col"><label>গ্রাম:</label><input type="text" id="village" placeholder="লিখুন..."></div>
    </div>
    
    <div class="row">
        <div class="col"><label>জন্ম তারিখ:</label><input type="text" id="dob" placeholder="০৩/০৫/১৯৭৩"></div>
        <div class="col">
            <label>লিঙ্গ:</label>
            <select id="gender">
                <option value="All">All</option>
                <option value="পুরুষ">পুরুষ (Male)</option>
                <option value="মহিলা">মহিলা (Female)</option>
            </select>
        </div>
    </div>

    <div class="btn-container">
        <button class="btn-search" onclick="searchData()">🔍 সার্চ</button>
        <button class="btn-clear" onclick="clearFields()">🔄 ক্লিয়ার</button>
    </div>

    <div class="status-bar">
        <span id="statusText">🔄 ক্লাউড ডাটাবেজ কানেক্ট করা হচ্ছে...</span>
        <span>ফলাফল: <span id="countText">0</span> জন</span>
    </div>

    <div class="results" id="resultsContainer">
        <div class="no-data">🔍<br>কোনো তথ্য পাওয়া যায়নি</div>
    </div>
</div>

<script>
    let db = null;
    
    // আপনার জেনুইন voters1.db গিটহাব রিপোজিটরি লিংক
    const githubDatabaseLink = "https://cdn.jsdelivr.net/gh/skforhadahmed99-ctrl/voters.db@main/voters1.db"; 

    async function initDatabase() {
        const statusText = document.getElementById('statusText');
        try {
            statusText.innerText = "🔄 গিটহাব থেকে চাঁদপুর ডাটাবেজ ডাউনলোড হচ্ছে...";
            const SQL = await initSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${file}` });
            
            const response = await fetch(githubDatabaseLink);
            if(!response.ok) throw new Error("Database fetch failed");
            
            const buf = await response.arrayBuffer();
            db = new SQL.Database(new Uint8Array(buf));
            statusText.innerText = "🟢 ডাটাবেজ অনলাইন সংযুক্ত হয়েছে!";
        } catch (e) {
            console.error(e);
            statusText.innerText = "🔴 ডাটাবেজ কানেকশন ব্যর্থ। লিংক বা ইন্টারনেট চেক করুন।";
        }
    }

    function clearFields() {
        document.getElementById('district').value = 'Chandpur';
        document.getElementById('upazila').value = 'All';
        document.getElementById('voterId').value = '';
        document.getElementById('name').value = '';
        document.getElementById('father').value = '';
        document.getElementById('mother').value = '';
        document.getElementById('village').value = '';
        document.getElementById('dob').value = '';
        document.getElementById('gender').value = 'All';
        document.getElementById('resultsContainer').innerHTML = '<div class="no-data">🔍<br>কোনো তথ্য পাওয়া যায়নি</div>';
        document.getElementById('countText').innerText = '0';
    }

    function searchData() {
        const container = document.getElementById('resultsContainer');
        const countText = document.getElementById('countText');

        if (!db) {
            alert("ডাটাবেজ এখনো পুরোপুরি লোড হয়নি। অনুগ্রহ করে সামান্য অপেক্ষা করুন✅।");
            return;
        }

        // লোগিং স্ট্যাটাস সক্রিয় করা
        container.innerHTML = `
            <div class="no-data">
                <div class="spinner"></div>
                <div>ডাটাবেজে অনুসন্ধান করা হচ্ছে... অনুগ্রহ করে অপেক্ষা করুন।</div>
            </div>`;
        countText.innerText = '0';

        setTimeout(() => {
            executeSearch();
        }, 1200);
    }

    function executeSearch() {
        const district = document.getElementById('district').value;
        const upazila = document.getElementById('upazila').value;
        const voterId = document.getElementById('voterId').value.trim();
        const name = document.getElementById('name').value.trim();
        const father = document.getElementById('father').value.trim();
        const mother = document.getElementById('mother').value.trim();
        const village = document.getElementById('village').value.trim();
        const dob = document.getElementById('dob').value.trim();
        const gender = document.getElementById('gender').value;
        
        const container = document.getElementById('resultsContainer');
        const countText = document.getElementById('countText');

        try {
            let query = "SELECT * FROM voters WHERE 1=1";
            let params = {};

            // 🎯 আপনার ডাটাবেজের সঠিক কলাম স্ট্রাকচার অনুযায়ী সার্চ কোয়েরি ম্যাপিং
            if(district !== 'All') { query += " AND district LIKE :district"; params[':district'] = `%${district}%`; }
            if(upazila !== 'All') { query += " AND subdistrict = :upazila"; params[':upazila'] = upazila; }
            if(voterId) { query += " AND (id = :voterId OR area_code = :voterId)"; params[':voterId'] = voterId; }
            
            // 🎯 নিখুঁত নাম সার্চ লজিক (যা খুঁজবে ঠিক সেটাই আসবে)
            if(name) { query += " AND name = :name"; params[':name'] = name; }
            
            if(father) { query += " AND father LIKE :father"; params[':father'] = `%${father}%`; }
            if(mother) { query += " AND mother LIKE :mother"; params[':mother'] = `%${mother}%`; }
            if(village) { query += " AND village LIKE :village"; params[':village'] = `%${village}%`; }
            if(dob) { query += " AND dob = :dob"; params[':dob'] = dob; }
            if(gender !== 'All') { query += " AND gender = :gender"; params[':gender'] = gender; }

            query += " LIMIT 100";

            const res = db.exec(query, params);
            container.innerHTML = '';

            if (res.length === 0 || res[0].values.length === 0) {
                container.innerHTML = '<div class="no-data">🔍<br>কোনো তথ্য পাওয়া যায়নি</div>';
                countText.innerText = '0';
                return;
            }

            const columns = res[0].columns;
            const rows = res[0].values;
            countText.innerText = rows.length;

            let index = 1;
            rows.forEach(row => {
                let data = {};
                columns.forEach((col, idx) => { data[col.toLowerCase()] = row[idx]; });

                // স্ক্রিনশটের কলাম ডাটা রিড করা
                let vId = data.id || 'N/A';
                let vName = data.name || 'N/A';
                let vFather = data.father || 'N/A';
                let vMother = data.mother || 'N/A';
                let vOccupation = data.occupation || 'শ্রমিক'; 
                let vDob = data.dob || 'N/A';
                let vWord = data.word_no || 'N/A';
                let vPostCode = data.postcode || 'N/A';
                let vPostOffice = data.post_office || 'N/A';
                let vVillage = data.village || 'N/A';
                let vSubdistrict = data.subdistrict || 'N/A';
                let vDistrict = data.district || 'N/A';
                let vAreaCode = data.area_code || 'N/A';
                let vGender = data.gender || 'পুরুষ';

                // সিরিয়াল নম্বর ৩ ডিজিট ফরম্যাটে করা (যেমন: 001)
                let serialNum = String(index++).padStart(3, '0');

                // 🛠️ আপনার ছবি অনুযায়ী রেডিমেড কার্ড ইউআই টেমপ্লেট
                container.innerHTML += `
                    <div class="voter-box">
                        <div class="voter-header">
                            <div>${serialNum}. নাম: ${vName}</div>
                            <button class="copy-btn" onclick="navigator.clipboard.writeText('${vId}')" title="Copy ID">ID: ${vId} 📋</button>
                        </div>
                        <div class="voter-body">
                            <div class="voter-grid">
                                <div class="voter-field"><span class="label">👤 পিতা:</span><span class="value">${vFather}</span></div>
                                <div class="voter-field"><span class="label">👩 মাতা:</span><span class="value">${vMother}</span></div>
                                <div class="voter-field"><span class="label">💼 পেশা:</span><span class="value">${vOccupation}</span></div>
                                <div class="voter-field"><span class="label">🎂 জন্ম তারিখ:</span><span class="value">${vDob}</span></div>
                            </div>
                            <div class="voter-grid" style="border-top: 1px dashed #eee; padding-top: 8px;">
                                <div class="voter-field"><span class="label">📍 ওয়ার্ড নং:</span><span class="value" style="color: green;">${vWord}</span></div>
                                <div class="voter-field"><span class="label">📮 পোস্টকোড:</span><span class="value" style="color: orange;">${vPostCode}</span></div>
                                <div class="voter-field"><span class="label">📦 ডাকঘর:</span><span class="value" style="color: navy;">${vPostOffice}</span></div>
                            </div>
                            <div class="full-width-field">
                                <span class="label">🏠 ঠিকানা:</span><span class="value">${vVillage}, ${vSubdistrict}, ${vDistrict}</span>
                            </div>
                            <div class="voter-footer">
                                <div>এরিয়া কোড: ${vAreaCode}</div>
                                <div class="gender-tag">🧬 ${vGender}</div>
                            </div>
                        </div>
                    </div>`;
            });
        } catch (err) {
            container.innerHTML = `<p style="color:red;">সার্চ ত্রুটি: ${err.message}</p>`;
        }
    }
    window.onload = initDatabase;
</script>
</body>
</html>
