<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Data Search System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 10px; background-color: #f5f6fa; }
        .header { background-color: #1565c0; color: white; padding: 15px; font-size: 20px; font-weight: bold; text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .container { max-width: 600px; margin: 10px auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .col { flex: 1; display: flex; align-items: center; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; background-color: #fdfdfd; font-size: 14px; }
        label { width: 60px; font-weight: bold; font-size: 14px; color: #333; }
        .btn-container { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; color: white; }
        .btn-search { background-color: #2e7d32; }
        .btn-clear { background-color: #c62828; }
        .status-bar { background-color: #e3f2fd; color: #0d47a1; padding: 10px; border-radius: 4px; margin-top: 15px; display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; }
        .results { margin-top: 15px; }
        .no-data { text-align: center; margin-top: 50px; color: #7f8c8d; font-size: 16px; }
        .voter-card { background: #fff; border: 1px solid #dfe4ea; border-left: 5px solid #1565c0; padding: 12px; margin-bottom: 10px; border-radius: 4px; text-align: left; }
        .voter-card p { margin: 5px 0; font-size: 14px; }
        .voter-card span { font-weight: bold; color: #555; }
    </style>
</head>
<body>

<div class="header">Easy Data Search System</div>

<div class="container">
    <div class="row">
        <div class="col">
            <select id="district">
                <option value="All">সব জেলা (All)</option>
                <option value="Chandpur">Chandpur</option>
            </select>
        </div>
        <div class="col">
            <select id="upazila">
                <option value="All">সব উপজেলা (All)</option>
                <option value="Chandpur Sadar">Chandpur Sadar</option>
            </select>
        </div>
    </div>

    <div class="row">
        <div class="col" style="flex: 1;"><label>ভোটার ID:</label><input type="text" id="voterId" placeholder="ভোটার আইডি লিখুন..."></div>
    </div>

    <div class="row">
        <div class="col"><label>নাম:</label><input type="text" id="name" placeholder="লিখুন..."></div>
        <div class="col"><label>পিতা:</label><input type="text" id="father" placeholder="লিখুন..."></div>
    </div>
    
    <div class="row">
        <div class="col"><label>মাতা:</label><input type="text" id="mother" placeholder="লিখুন..."></div>
        <div class="col"><label>গ্রাম:</label><input type="text" id="village" placeholder="লিখুন..."></div>
    </div>
    
    <div class="row">
        <div class="col"><label>জ. তারিখ:</label><input type="text" id="dob" placeholder="১২/০৫/২০০০"></div>
        <div class="col">
            <label>লিঙ্গ:</label>
            <select id="gender">
                <option value="All">All</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
        </div>
    </div>

    <div class="btn-container">
        <button class="btn-search" onclick="searchData()">🔍 সার্চ</button>
        <button class="btn-clear" onclick="clearFields()">🔄 ক্লিয়ার</button>
    </div>

    <div class="status-bar">
        <span id="statusText">🔄 ক্লাউড ডাটাবেজ কানেক্ট করা হচ্ছে...</span>
        <span>ফলাফল: <span id="countText">0</span> জন</span>
    </div>

    <div class="results" id="resultsContainer">
        <div class="no-data">🔍<br>কোনো তথ্য পাওয়া যায়নি</div>
    </div>
</div>

<script>
    let db = null;
    
    // 🟢 আপনার আপলোড করা রেপো এবং ফাইলের নিখুঁত jsDelivr CDN লিংক
    const githubDatabaseLink = "https://cdn.jsdelivr.net/gh/skforhadahmed99-ctrl/voters.db@main/voters.db"; 

    async function initDatabase() {
        const statusText = document.getElementById('statusText');
        try {
            statusText.innerText = "🔄 গিটহাব থেকে ডাটাবেজ ডাউনলোড হচ্ছে (১০ এমবি)... একটু অপেক্ষা করুন।";
            const SQL = await initSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${file}` });
            
            // গিটহাব সিডিএন থেকে ১০ এমবি ফাইল রিড করা হচ্ছে
            const response = await fetch(githubDatabaseLink);
            if(!response.ok) throw new Error("Database fetch failed");
            
            const buf = await response.arrayBuffer();
            db = new SQL.Database(new Uint8Array(buf));
            statusText.innerText = "🟢 ডাটাবেজ অনলাইন সংযুক্ত হয়েছে!";
        } catch (e) {
            console.error(e);
            statusText.innerText = "🔴 ডাটাবেজ কানেকশন করা যাচ্ছে না। গিটহাব লিংক বা ইন্টারনেট চেক করুন।";
        }
    }

    function clearFields() {
        document.getElementById('district').value = 'All';
        document.getElementById('upazila').value = 'All';
        document.getElementById('voterId').value = '';
        document.getElementById('name').value = '';
        document.getElementById('father').value = '';
        document.getElementById('mother').value = '';
        document.getElementById('village').value = '';
        document.getElementById('dob').value = '';
        document.getElementById('gender').value = 'All';
        document.getElementById('resultsContainer').innerHTML = '<div class="no-data">🔍<br>কোনো তথ্য পাওয়া যায়নি</div>';
        document.getElementById('countText').innerText = '0';
    }

    function searchData() {
        const district = document.getElementById('district').value;
        const upazila = document.getElementById('upazila').value;
        const voterId = document.getElementById('voterId').value.trim();
        const name = document.getElementById('name').value.trim();
        const father = document.getElementById('father').value.trim();
        const mother = document.getElementById('mother').value.trim();
        const village = document.getElementById('village').value.trim();
        const dob = document.getElementById('dob').value.trim();
        const gender = document.getElementById('gender').value;
        
        const container = document.getElementById('resultsContainer');
        const countText = document.getElementById('countText');

        if (!db) {
            alert("ডাটাবেজ ফাইলটি এখনো ডাউনলোড হচ্ছে। ১০ এমবি ফাইল তাই একটু সময় লাগতে পারে✅।");
            return;
        }

        try {
            let query = "SELECT * FROM voters WHERE 1=1";
            let params = {};

            // নতুন যুক্ত হওয়া টেবিল কলামের কুয়েরি ফিল্টারিং
            if(district !== 'All') { query += " AND district = :district"; params[':district'] = district; }
            if(upazila !== 'All') { query += " AND upazila = :upazila"; params[':upazila'] = upazila; }
            if(voterId) { query += " AND voter_id = :voterId"; params[':voterId'] = voterId; }
            
            // পূর্বের টেক্সট ফিল্টারিং
            if(name) { query += " AND name LIKE :name"; params[':name'] = `%${name}%`; }
            if(father) { query += " AND father_name LIKE :father"; params[':father'] = `%${father}%`; }
            if(mother) { query += " AND mother_name LIKE :mother"; params[':mother'] = `%${mother}%`; }
            if(village) { query += " AND address LIKE :village"; params[':village'] = `%${village}%`; }
            if(dob) { query += " AND dob = :dob"; params[':dob'] = dob; }
            if(gender !== 'All') { query += " AND gender = :gender"; params[':gender'] = gender; }

            query += " LIMIT 500"; // ব্রাউজার ক্র্যাশ হওয়া রোধ করতে লিমিট ৫০০ রাখা হয়েছে

            const stmt = db.prepare(query);
            const res = stmt.execute(params);
            container.innerHTML = '';

            if (res.length === 0 || res[0].values.length === 0) {
                container.innerHTML = '<div class="no-data">🔍<br>কোনো তথ্য পাওয়া যায়নি</div>';
                countText.innerText = '0';
                return;
            }

            const columns = res[0].columns;
            const rows = res[0].values;
            countText.innerText = rows.length;

            rows.forEach(row => {
                let data = {};
                columns.forEach((col, idx) => { data[col.toLowerCase()] = row[idx]; });

                // সব ডেটা ডাইনামিক্যালি কার্ডে প্রদর্শন করার ডিজাইন
                container.innerHTML += `
                    <div class="voter-card">
                        <p><span>ভোটার ID:</span> ${data.voter_id || 'N/A'}</p>
                        <p><span>নাম:</span> ${data.name || 'N/A'}</p>
                        <p><span>পিতা:</span> ${data.father_name || 'N/A'}</p>
                        <p><span>মাতা:</span> ${data.mother_name || 'N/A'}</p>
                        <p><span>গ্রাম/ঠিকানা:</span> ${data.address || 'N/A'}</p>
                        <p><span>উপজেলা:</span> ${data.upazila || 'N/A'}</p>
                        <p><span>জেলা:</span> ${data.district || 'N/A'}</p>
                        <p><span>জন্ম তারিখ:</span> ${data.dob || 'N/A'}</p>
                        <p><span>লিঙ্গ:</span> ${data.gender || 'N/A'}</p>
                    </div>`;
            });
            stmt.free();
        } catch (err) {
            container.innerHTML = `<p style="color:red;">সার্চ ত্রুটি: ${err.message}</p>`;
        }
    }
    window.onload = initDatabase;
</script>
</body>
</html>
