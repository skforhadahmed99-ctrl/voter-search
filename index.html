<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Data Search System - Upgraded</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 10px; background-color: #f5f6fa; }
        .header { background-color: #1565c0; color: white; padding: 15px; font-size: 20px; font-weight: bold; text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        /* Layout Grid for Statistics and Main Search */
        .main-layout { display: flex; flex-direction: row-reverse; gap: 15px; max-width: 1000px; margin: 10px auto; align-items: flex-start; }
        
        .stats-panel { flex: 1; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.05); border-top: 4px solid #1565c0; position: sticky; top: 10px; }
        .stats-title { font-weight: bold; font-size: 15px; margin-bottom: 10px; color: #1565c0; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .stats-list { list-style: none; padding: 0; margin: 0; }
        .stats-item { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px dashed #eee; font-weight: bold; }
        .stats-count { background: #e3f2fd; color: #0d47a1; padding: 2px 8px; border-radius: 12px; font-size: 12px; }

        .container { flex: 2; max-width: 650px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.05); margin: 0; }
        
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .col { flex: 1; display: flex; align-items: center; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; background-color: #fdfdfd; font-size: 14px; }
        label { width: 80px; font-weight: bold; font-size: 14px; color: #333; }
        .btn-container { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; color: white; }
        .btn-search { background-color: #2e7d32; }
        .btn-clear { background-color: #c62828; }
        .status-bar { background-color: #e3f2fd; color: #0d47a1; padding: 10px; border-radius: 4px; margin-top: 15px; display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; }
        .results { margin-top: 15px; }
        .no-data { text-align: center; margin-top: 50px; color: #7f8c8d; font-size: 16px; font-weight: 500; }
        
        .voter-box { background: #fff; border: 2px solid #c62828; border-radius: 8px; overflow: hidden; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: left; }
        .voter-header { background-color: #1565c0; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 16px; }
        .voter-body { padding: 15px; background: #fff; }
        .voter-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 10px; }
        .voter-field { font-size: 15px; color: #333; display: flex; align-items: center; }
        .voter-field span.label { color: #7f8c8d; width: 100px; display: inline-block; }
        .voter-field span.value { font-weight: bold; color: #111; }
        
        .voter-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px; }
        .meta-field { font-size: 14px; display: flex; align-items: center; }
        .meta-field span.label { color: #7f8c8d; margin-right: 5px; }
        .meta-field span.value { font-weight: bold; }
        
        .full-width-field { background: #f8f9fa; padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 14px; border: 1px solid #eef2f3; display: flex; align-items: flex-start; }
        .full-width-field span.label { color: #7f8c8d; margin-right: 5px; white-space: nowrap; }
        .full-width-field span.value { font-weight: bold; color: #111; }
        
        .voter-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 10px; border-top: 1px dashed #dfe4ea; font-size: 14px; color: #555; }
        .gender-tag-male { background-color: #1565c0; color: white; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 13px; }
        .gender-tag-female { background-color: #ec407a; color: white; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 13px; }
        .copy-btn { cursor: pointer; background: rgba(255,255,255,0.2); border: none; color: white; padding: 4px 10px; border-radius: 4px; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 3px; white-space: nowrap; }

        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #1565c0; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Responsive design for Mobile Screen */
        @media (max-width: 768px) {
            .main-layout { flex-direction: column; }
            .stats-panel { width: 100%; position: static; box-sizing: border-box; }
            .container { width: 100%; box-sizing: border-box; }
        }
    </style>
</head>
<body>

<div class="header">Easy Data Search System</div>

<div class="main-layout">
    <div class="stats-panel">
        <div class="stats-title">📊 জেলা ভিত্তিক মোট তথ্য সংখ্যা</div>
        <ul class="stats-list" id="statsList">
            <li class="stats-item" style="color: #7f8c8d;">ডাটাবেজ লোড হচ্ছে...</li>
        </ul>
    </div>

    <div class="container">
        <div class="row">
            <div class="col">
                <select id="district" onchange="updateUpazilaOptions()">
                    <option value="All">সব জেলা (All)</option>
                    <option value="Chandpur" selected>চাঁদপুর (Chandpur)</option>
                    <option value="Dhaka">ঢাকা (Dhaka)</option>
                    <option value="Chittagong">চট্টগ্রাম (Chittagong)</option>
                </select>
            </div>
            <div class="col">
                <select id="upazila">
                    </select>
            </div>
        </div>

        <div class="row">
            <div class="col" style="flex: 1;"><label>ভোটার ID:</label><input type="text" id="voterId" placeholder="ভোটার আইডি লিখুন..."></div>
        </div>

        <div class="row">
            <div class="col"><label>নাম:</label><input type="text" id="name" placeholder="লিখুন..."></div>
            <div class="col"><label>পিতা:</label><input type="text" id="father" placeholder="লিখুন..."></div>
        </div>
        
        <div class="row">
            <div class="col"><label>মাতা:</label><input type="text" id="mother" placeholder="লিখুন..."></div>
            <div class="col"><label>গ্রাম:</label><input type="text" id="village" placeholder="লিখুন..."></div>
        </div>
        
        <div class="row">
            <div class="col"><label>জন্ম তারিখ:</label><input type="text" id="dob" placeholder="১২/০৫/২০০০"></div>
            <div class="col">
                <label>লিঙ্গ:</label>
                <select id="gender">
                    <option value="All">All</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
        </div>

        <div class="btn-container">
            <button class="btn-search" onclick="searchData()">🔍 সার্চ</button>
            <button class="btn-clear" onclick="clearFields()">🔄 ক্লিয়ার</button>
        </div>

        <div class="status-bar">
            <span id="statusText">🔄 ক্লাউড ডাটাবেজ কানেক্ট করা হচ্ছে...</span>
            <span>ফলাফল: <span id="countText">0</span> জন</span>
        </div>

        <div class="results" id="resultsContainer">
            <div class="no-data">🔍<br>কোনো তথ্য পাওয়া যায়নি</div>
        </div>
    </div>
</div>

<script>
    let db = null;
    
    // আপনার নতুন গিটহাব রেপো এবং মেইন ভোটার্স ডাটাবেজের সরাসরি র লিংকের ইন্টিগ্রেশন
    const githubDatabaseLink = "https://cdn.jsdelivr.net/gh/skforhadahmed99-ctrl/voters.db@main/voters.db"; 

    // জেলা ভিত্তিক উপজেলার ডাইনামিক ডাটা সেটআপ
    const upazilaData = {
        "Chandpur": [
            { value: "All", text: "সব উপজেলা (All)" },
            { value: "Faridganj", text: "ফریدগঞ্জ (Faridganj)" },
            { value: "Kachua", text: "কচুয়া (Kachua)" },
            { value: "Chandpur Sadar", text: "চাঁদপুর সদর (Chandpur Sadar)" },
            { value: "Hajiganj", text: "হাজীগঞ্জ (Hajiganj)" },
            { value: "Matlab Uttar", text: "মতলব উত্তর (Matlab Uttar)" },
            { value: "Matlab Dakshin", text: "মতলব দক্ষিণ (Matlab Dakshin)" },
            { value: "Haimchar", text: "হাইমচর (Haimchar)" },
            { value: "Shahrasti", text: "শাহরাস্তি (Shahrasti)" }
        ],
        "Dhaka": [
            { value: "All", text: "সব উপজেলা (All)" },
            { value: "Dhamrai", text: "ধামরাই (Dhamrai)" },
            { value: "Savar", text: "সাভার (Savar)" },
            { value: "Keraniganj", text: "কেরানীগঞ্জ (Keraniganj)" }
        ],
        "Chittagong": [
            { value: "All", text: "সব উপজেলা (All)" },
            { value: "Hathazari", text: "হাটহাজারী (Hathazari)" },
            { value: "Patiya", text: "পটিয়া (Patiya)" },
            { value: "Raozan", text: "রাউজান (Raozan)" }
        ],
        "All": [
            { value: "All", text: "সব উপজেলা (All)" }
        ]
    };

    // বাংলা-ইংরেজি রূপান্তরের জন্য ম্যাপ স্কিমা (সার্চের সুবিধার্থে)
    const banglaTranslation = {
        "Chandpur": "চাঁদপুর",
        "Dhaka": "ঢাকা",
        "Chittagong": "চট্টগ্রাম",
        "Faridganj": "ফریدগঞ্জ",
        "Kachua": "কচুয়া",
        "Chandpur Sadar": "চাঁদপুর সদর",
        "Hajiganj": "হাজীগঞ্জ",
        "Matlab Uttar": "মতলব উত্তর",
        "Matlab Dakshin": "মতলব দক্ষিণ",
        "Haimchar": "হাইমচর",
        "Shahrasti": "শাহরাস্তি",
        "Dhamrai": "ধামরাই",
        "Savar": "সাভার",
        "Keraniganj": "কেরানীগঞ্জ",
        "Hathazari": "হাটহাজারী",
        "Patiya": "পটিয়া",
        "Raozan": "রাউজান"
    };

    function updateUpazilaOptions() {
        const districtSelect = document.getElementById('district').value;
        const upazilaSelect = document.getElementById('upazila');
        upazilaSelect.innerHTML = '';

        const upazilas = upazilaData[districtSelect] || upazilaData["All"];
        upazilas.forEach(upz => {
            const option = document.createElement('option');
            option.value = upz.value;
            option.text = upz.text;
            upazilaSelect.appendChild(option);
        });
    }

    async function initDatabase() {
        const statusText = document.getElementById('statusText');
        try {
            statusText.innerText = "🔄 গিটহাব থেকে ডাটাবেজ ডাউনলোড হচ্ছে... একটু অপেক্ষা করুন।";
            const SQL = await initSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${file}` });
            
            const response = await fetch(githubDatabaseLink);
            if(!response.ok) throw new Error("Database fetch failed");
            
            const buf = await response.arrayBuffer();
            db = new SQL.Database(new Uint8Array(buf));
            statusText.innerText = "🟢 ডাটাবেজ অনলাইন সংযুক্ত হয়েছে!";
            
            // লাইভ ডাটা কাউন্ট ক্যালকুলেট করা
            calculateStatistics();
        } catch (e) {
            console.error(e);
            statusText.innerText = "🔴 ডাটাবেজ কানেকশন করা যাচ্ছে না। গিটহাব লিংক চেক করুন।";
            document.getElementById('statsList').innerHTML = '<li class="stats-item" style="color:red;">ডাটাবেজ কানেকশন ইরর!</li>';
        }
    }

    function calculateStatistics() {
        const statsList = document.getElementById('statsList');
        statsList.innerHTML = '';
        
        let grandTotal = 0;
        
        // সম্পূর্ণ টেবিল থেকে মূল সর্বমোট ডাটা নিয়ে আসা
        try {
            let resGrand = db.exec("SELECT COUNT(*) as count FROM voters");
            if (resGrand.length > 0 && resGrand[0].values.length > 0) {
                grandTotal = resGrand[0].values[0][0];
            }
        } catch (error) {
            console.error("Error fetching grand total from DB", error);
        }

        const districtsToCount = [
            { eng: 'Chandpur', bng: 'চাঁদপুর' },
            { eng: 'Dhaka', bng: 'ঢাকা' },
            { eng: 'Chittagong', bng: 'চট্টগ্রাম' }
        ];

        districtsToCount.forEach(dist => {
            try {
                // বাংলা এবং ইংরেজি উভয় বানানের সার্চ কাউন্ট নিশ্চিত করা
                let query = "SELECT COUNT(*) as count FROM voters WHERE district LIKE :eng OR district_name LIKE :eng OR district LIKE :bng OR district_name LIKE :bng";
                let res = db.exec(query, { ':eng': `%${dist.eng}%`, ':bng': `%${dist.bng}%` });
                let count = (res.length > 0 && res[0].values.length > 0) ? res[0].values[0][0] : 0;

                statsList.innerHTML += `
                    <li class="stats-item">
                        <span>📍 ${dist.bng} (${dist.eng})</span>
                        <span class="stats-count">${count.toLocaleString()} টি</span>
                    </li>`;
            } catch (error) {
                console.error("Error generating stats for " + dist.eng, error);
            }
        });

        // প্রকৃত সর্বমোট ডাটা নিচে দেখানো হচ্ছে
        statsList.innerHTML += `
            <li class="stats-item" style="border-top: 2px solid #1565c0; margin-top: 5px; padding-top: 8px; color: #2e7d32;">
                <span>🔥 সর্বমোট ডাটা (Total)</span>
                <span class="stats-count" style="background: #e8f5e9; color: #1b5e20;">${grandTotal.toLocaleString()} টি</span>
            </li>`;
    }

    function clearFields() {
        document.getElementById('district').value = 'Chandpur';
        updateUpazilaOptions();
        document.getElementById('voterId').value = '';
        document.getElementById('name').value = '';
        document.getElementById('father').value = '';
        document.getElementById('mother').value = '';
        document.getElementById('village').value = '';
        document.getElementById('dob').value = '';
        document.getElementById('gender').value = 'All';
        document.getElementById('resultsContainer').innerHTML = '<div class="no-data">🔍<br>কোনো তথ্য পাওয়া যায়নি</div>';
        document.getElementById('countText').innerText = '0';
    }

    function searchData() {
        const container = document.getElementById('resultsContainer');
        const countText = document.getElementById('countText');

        if (!db) {
            alert("ডাটাবেজ ফাইলটি এখনো ডাউনলোড হচ্ছে। অনুগ্রহ করে একটু অপেক্ষা করুন✅।");
            return;
        }

        container.innerHTML = `
            <div class="no-data">
                <div class="spinner"></div>
                <div>ডাটাবেজে অনুসন্ধান করা হচ্ছে... অনুগ্রহ করে অপেক্ষা করুন।</div>
            </div>`;
        countText.innerText = '0';

        setTimeout(() => {
            executeActualSearch();
        }, 800);
    }

        function executeActualSearch() {
        const district = document.getElementById('district').value;
        const upazila = document.getElementById('upazila').value;
        const voterId = document.getElementById('voterId').value.trim();
        const name = document.getElementById('name').value.trim();
        const father = document.getElementById('father').value.trim();
        const mother = document.getElementById('mother').value.trim();
        const village = document.getElementById('village').value.trim();
        const dob = document.getElementById('dob').value.trim();
        const gender = document.getElementById('gender').value;
        
        const container = document.getElementById('resultsContainer');
        const countText = document.getElementById('countText');

        try {
            let query = "SELECT * FROM voters WHERE 1=1";
            let params = {};

            // জেলা ফিল্টারিং (বাংলা ও ইংরেজি দুই রূপেই খুঁজবে)
            if(district !== 'All') { 
                const bdDistrict = banglaTranslation[district] || '';
                query += " AND (district LIKE :district OR district_name LIKE :district OR district LIKE :bdDistrict OR district_name LIKE :bdDistrict)"; 
                params[':district'] = `%${district}%`; 
                params[':bdDistrict'] = `%${bdDistrict}%`; 
            }
            
            // উপজেলা ফিল্টারিং (বাংলা ও ইংরেজি দুই রূপেই খুঁজবে)
            if(upazila !== 'All') { 
                const bdUpazila = banglaTranslation[upazila] || '';
                
                // কচুয়া এবং পটিয়া বানানের ক্ষেত্রে ব্রাউজার ও ডেটাবেজের ইউনিকোড অক্ষর জটিলতা এড়াতে অল্টারনেটিভ বানান যুক্ত করা
                let extraCondition = "";
                if (upazila === "Kachua") {
                    extraCondition = " OR upazila LIKE :bdUpazilaAlt OR upazila_name LIKE :bdUpazilaAlt OR upazilla LIKE :bdUpazilaAlt OR subdistrict LIKE :bdUpazilaAlt";
                    params[':bdUpazilaAlt'] = `%কচুয়া%`; 
                } else if (upazila === "Patiya") {
                    extraCondition = " OR upazila LIKE :bdUpazilaAlt OR upazila_name LIKE :bdUpazilaAlt OR upazilla LIKE :bdUpazilaAlt OR subdistrict LIKE :bdUpazilaAlt";
                    params[':bdUpazilaAlt'] = `%পটিয়া%`;
                }

                query += ` AND (upazila LIKE :upazila OR upazila_name LIKE :upazila OR upazilla LIKE :upazila OR subdistrict LIKE :upazila OR upazila LIKE :bdUpazila OR upazila_name LIKE :bdUpazila OR upazilla LIKE :bdUpazila OR subdistrict LIKE :bdUpazila ${extraCondition})`; 
                params[':upazila'] = `%${upazila}%`; 
                params[':bdUpazila'] = `%${bdUpazila}%`; 
            }
            
            if(voterId) { query += " AND (voter_no = :voterId OR voter_id = :voterId OR id = :voterId OR card_no = :voterId)"; params[':voterId'] = voterId; }
            if(name) { query += " AND name LIKE :name"; params[':name'] = `%${name}%`; }
            if(father) { query += " AND (father_name LIKE :father OR father LIKE :father)"; params[':father'] = `%${father}%`; }
            if(mother) { query += " AND (mother_name LIKE :mother OR mother LIKE :mother)"; params[':mother'] = `%${mother}%`; }
            if(village) { query += " AND (address LIKE :village OR village LIKE :village OR address_details LIKE :village)"; params[':village'] = `%${village}%`; }
            if(dob) { query += " AND (dob = :dob OR date_of_birth = :dob OR birth_date = :dob)"; params[':dob'] = dob; }
            if(gender !== 'All') { query += " AND (gender = :gender OR sex = :gender)"; params[':gender'] = gender; }

            query += " LIMIT 100";

            const res = db.exec(query, params);
            container.innerHTML = '';

            if (res.length === 0 || res[0].values.length === 0) {
                container.innerHTML = '<div class="no-data">🔍<br>অনুসন্ধান সম্পন্ন! কোনো তথ্য পাওয়া যায়নি</div>';
                countText.innerText = '0';
                return;
            }

            const columns = res[0].columns;
            const rows = res[0].values;
            countText.innerText = rows.length;

            let index = 1;
            rows.forEach(row => {
                let data = {};
                columns.forEach((col, idx) => { data[col.toLowerCase()] = row[idx]; });

                let vId = data.voter_no || data.voter_id || data.card_no || data.nid || 'N/A';
                let vName = data.name || 'N/A';
                vName = vName.replace(/^(.*?)(নাম\s*:\s*)/i, ''); 

                let vFather = (data.father_name || data.father || 'N/A').replace(/^(.*?)(পিতা\s*:\s*)/i, '');
                let vMother = (data.mother_name || data.mother || 'N/A').replace(/^(.*?)(মাতা\s*:\s*)/i, '');
                let vOccupation = data.occupation || data.pasha || 'N/A'; 
                let vDob = data.dob || data.date_of_birth || data.birth_date || 'N/A';
                
                let vWord = data.word_no || data.word || '০১';
                let vPostCode = data.postcode || data.post_code || '৩৬৫0';
                let vPostOffice = data.post_office || data.dakghor || 'N/A';
                
                let vVillage = data.village || data.address || data.address_details || 'N/A';
                let vSubdistrict = data.upazila || data.upazila_name || data.subdistrict || 'N/A';
                let vDistrict = data.district || data.district_name || 'N/A';
                
                let vGender = data.gender || data.sex || 'Male';

                let serialNum = String(index++).padStart(3, '0');
                let isFemale = (vGender === 'Female' || vGender === 'মহিলা' || vGender.includes('মহিলা'));
                let genderTag = isFemale ? '<div class="gender-tag-female">♀️   মহিলা</div>' : '<div class="gender-tag-male">♂️   পুরুষ</div>';

                container.innerHTML += `
                    <div class="voter-box">
                        <div class="voter-header">
                            <div>${serialNum}. নাম: ${vName}</div>
                            <button class="copy-btn" onclick="navigator.clipboard.writeText('${vId}'); alert('ID Copied!');">ID: ${vId} 📋</button>
                        </div>
                        <div class="voter-body">
                            <div class="voter-grid">
                                <div class="voter-field"><span class="label">👤   পিতা:</span><span class="value">${vFather}</span></div>
                                <div class="voter-field"><span class="label">👤   মাতা:</span><span class="value">${vMother}</span></div>
                                <div class="voter-field"><span class="label">💼   পেশা:</span><span class="value">${vOccupation}</span></div>
                                <div class="voter-field"><span class="label">📅   জন্ম তারিখ:</span><span class="value">${vDob}</span></div>
                            </div>
                            
                            <div class="voter-meta-grid">
                                <div class="meta-field"><span class="label">📍 ওয়ার্ড:</span><span class="value">${vWord}</span></div>
                                <div class="meta-field"><span class="label">📮 পোস্ট কোড:</span><span class="value">${vPostCode}</span></div>
                                <div class="meta-field"><span class="label">🏤 পোস্ট অফিস:</span><span class="value">${vPostOffice}</span></div>
                                <div class="meta-field"><span class="label">🌍 গ্রাম:</span><span class="value">${vVillage}</span></div>
                            </div>
                            
                            <div class="voter-footer">
                                <div>${genderTag}</div>
                                <div>${vSubdistrict}, ${vDistrict}</div>
                            </div>
                        </div>
                    </div>`;
            });
        } catch (error) {
            console.error(error);
            container.innerHTML = '<div class="no-data">🔴 অনুসন্ধানের সময় কোনো সমস্যা হয়েছে। ডাটাবেজ টেবিল স্কিমা চেক করুন।</div>';
        }
    }

    // পেজ লোড হওয়ার সাথে সাথে অ্যাকশন চালু করার জন্য
    window.onload = () => {
        updateUpazilaOptions();
        initDatabase();
    };
</script>

</body>
</html>
